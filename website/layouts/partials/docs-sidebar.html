{{/*
  Sidebar nav for /docs. Lists every page in the docs section ordered
  by weight, with the current page marked is-active. Mobile: rendered
  as a <select> by /layouts/docs/* templates instead.
*/}}
{{ $current := .RelPermalink }}
{{ $docs := where site.RegularPages "Section" "docs" }}
{{ $docs = $docs.ByWeight }}

<aside class="docs-sidebar hidden lg:block" aria-label="Docs navigation">
  <div class="docs-nav-section">Documentation</div>
  <nav class="docs-nav-list">
    <a href="/docs/" class="docs-nav-link {{ if eq $current "/docs/" }}is-active{{ end }}">Overview</a>
    {{ range $docs }}
      <a href="{{ .RelPermalink }}" class="docs-nav-link {{ if eq $current .RelPermalink }}is-active{{ end }}">{{ .Title }}</a>
    {{ end }}
  </nav>

  <div class="docs-nav-section">More</div>
  <nav class="docs-nav-list">
    <a href="{{ site.Params.github_url }}" rel="noopener" target="_blank" class="docs-nav-link">GitHub →</a>
    <a href="{{ site.Params.releases_url }}" rel="noopener" target="_blank" class="docs-nav-link">Releases →</a>
  </nav>
</aside>

{{/* Mobile select */}}
<div class="lg:hidden mb-6">
  <label for="docs-mobile-select" class="block text-xs uppercase tracking-wider mb-2"
         style="color: var(--color-muted);">Documentation</label>
  <select id="docs-mobile-select" class="docs-mobile-nav" aria-label="Jump to a docs page">
    <option value="">Jump to a doc…</option>
    <option value="/docs/" {{ if eq $current "/docs/" }}selected{{ end }}>Overview</option>
    {{ range $docs }}
      <option value="{{ .RelPermalink }}" {{ if eq $current .RelPermalink }}selected{{ end }}>{{ .Title }}</option>
    {{ end }}
  </select>
</div>

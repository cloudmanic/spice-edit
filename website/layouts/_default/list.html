{{ define "main" }}
<div class="container-page py-12 lg:py-20">
  <header class="mb-10 max-w-3xl">
    <h1 class="text-3xl lg:text-5xl font-semibold tracking-tight" style="color: #fff;">{{ .Title }}</h1>
    {{ with .Description }}<p class="mt-3 text-lg" style="color: var(--color-text-soft);">{{ . }}</p>{{ end }}
  </header>
  <ul class="grid sm:grid-cols-2 gap-4">
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}" class="card block">
          <h3 class="text-lg font-semibold" style="color: #fff;">{{ .Title }}</h3>
          <p class="text-sm mt-1" style="color: var(--color-text-soft);">{{ .Description | default (.Summary | plainify | truncate 140) }}</p>
        </a>
      </li>
    {{ end }}
  </ul>
</div>
{{ end }}
